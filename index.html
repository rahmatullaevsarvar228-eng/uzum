<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
<title>Intervyuer Qo'llanmasi — Zerkalo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f4f7fc;
    --white:   #ffffff;
    --blue1:   #1a4a8a;   /* deep blue */
    --blue2:   #2d6cc0;   /* medium blue */
    --blue3:   #e8f0fb;   /* light blue bg */
    --blue4:   #c8dcf8;   /* border blue */
    --amber:   #c8790a;
    --amb-bg:  #fff4e0;
    --red:     #b83232;
    --red-bg:  #fdf0f0;
    --green:   #1e7a4a;
    --grn-bg:  #edfaf3;
    --text:    #18243a;
    --text2:   #4a5a7a;
    --border:  #d0ddf0;
    --shadow:  0 4px 20px rgba(26,74,138,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 18px; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.7; }

  /* ── HEADER ── */
  header { background: var(--blue1); position: sticky; top: 0; z-index: 200; box-shadow: 0 3px 16px rgba(0,0,0,0.20); }
  .hdr { max-width: 720px; margin: 0 auto; padding: 13px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .logo-txt { font-size: 1rem; font-weight: 900; color: #fff; line-height: 1.25; }
  .logo-txt span { color: #a8ccff; font-weight: 700; font-size: 0.85rem; display: block; }
  .prog-wrap { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
  .pdot { min-width: 32px; height: 32px; border-radius: 9px; border: 2px solid rgba(255,255,255,0.22); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.72rem; color: rgba(255,255,255,0.40); transition: all 0.3s; padding: 0 5px; }
  .pdot.done  { background: #a8ccff; border-color: #a8ccff; color: var(--blue1); }
  .pdot.active{ background: #fff;    border-color: #fff;    color: var(--blue1); }

  /* ── LAYOUT ── */
  #app { max-width: 720px; margin: 0 auto; padding: 20px 14px 80px; }
  .page { animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

  /* ── CARD ── */
  .card { background: var(--white); border-radius: 22px; box-shadow: var(--shadow); margin-bottom: 18px; overflow: hidden; border: 1.5px solid var(--border); }
  .card-top { background: linear-gradient(135deg, var(--blue1) 0%, var(--blue2) 100%); padding: 22px 22px 18px; display: flex; align-items: flex-start; gap: 16px; }
  .card-emoji { font-size: 2.4rem; line-height: 1; flex-shrink: 0; margin-top: 2px; }
  .card-top h2 { font-size: 1.22rem; font-weight: 900; color: #fff; line-height: 1.3; margin-bottom: 4px; }
  .card-top p  { font-size: 0.92rem; color: rgba(255,255,255,0.78); line-height: 1.5; }
  .card-body { padding: 22px; }
  .card-body p { font-size: 1rem; line-height: 1.75; color: var(--text); margin-bottom: 14px; }
  .card-body strong { font-weight: 800; }

  /* ── SUBHEADING ── */
  h3.sub { font-size: 1.05rem; font-weight: 800; color: var(--blue1); margin: 24px 0 12px; display: flex; align-items: center; gap: 10px; }
  h3.sub::before { content:''; width:5px; height:22px; background:var(--amber); border-radius:4px; flex-shrink:0; }

  /* ── ALERT BOXES ── */
  .box { border-radius: 14px; padding: 16px 18px; margin: 14px 0; display: flex; align-items: flex-start; gap: 14px; font-size: 0.97rem; line-height: 1.7; }
  .box-ico { font-size: 1.4rem; flex-shrink: 0; margin-top: 1px; }
  .box-txt strong { font-weight: 800; display: block; margin-bottom: 3px; }
  .box.blue  { background: var(--blue3);  border-left: 5px solid var(--blue2); color: #0e2a5a; }
  .box.amber { background: var(--amb-bg); border-left: 5px solid var(--amber); color: #5a3500; }
  .box.red   { background: var(--red-bg); border-left: 5px solid var(--red);   color: #5a1010; }
  .box.green { background: var(--grn-bg); border-left: 5px solid var(--green); color: #0e3d22; }

  /* ── CHECKLIST ── */
  .clist { list-style: none; margin: 10px 0 16px; }
  .clist li { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1.5px dashed var(--border); font-size: 0.98rem; line-height: 1.65; }
  .clist li:last-child { border-bottom: none; }
  .clist li::before { content:'✓'; color: var(--blue2); font-weight: 900; font-size: 1.1rem; flex-shrink:0; margin-top:1px; }
  .clist li.no::before { content:'✗'; color: var(--red); }

  /* ── STEPS ── */
  .steps { margin: 14px 0; }
  .step { display: flex; gap: 14px; margin-bottom: 14px; align-items: flex-start; }
  .step-n { width: 36px; height: 36px; border-radius: 50%; background: var(--blue1); color: #fff; font-weight: 900; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .step-t { font-size: 0.98rem; line-height: 1.65; padding-top: 6px; }

  /* ── INTRO GRID ── */
  .igrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
  .icard { background: var(--blue3); border-radius: 14px; padding: 14px 15px; display: flex; align-items: flex-start; gap: 10px; border: 1.5px solid var(--blue4); }
  .icard-ico { font-size: 1.5rem; flex-shrink: 0; }
  .icard h4  { font-size: 0.88rem; font-weight: 800; color: var(--blue1); margin-bottom: 2px; }
  .icard p   { font-size: 0.82rem; color: var(--text2); line-height: 1.5; }

  /* ── TWO-COL ── */
  .twocol { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
  .tcol { background: var(--bg); border-radius: 14px; padding: 15px; border: 1.5px solid var(--border); }
  .tcol h4 { font-size: 0.9rem; font-weight: 800; color: var(--text); margin-bottom: 10px; }
  .tcol ul { list-style: none; }
  .tcol ul li { font-size: 0.88rem; line-height: 1.6; color: var(--text2); padding: 3px 0; }
  .tcol ul li::before { content:'• '; color: var(--blue2); font-weight: 900; }

  /* ── TABLE ── */
  .dtable { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin: 14px 0; border-radius: 12px; overflow: hidden; border: 1.5px solid var(--border); }
  .dtable th { background: var(--blue1); color: #fff; padding: 12px 14px; font-size: 0.85rem; font-weight: 800; text-align: left; }
  .dtable td { padding: 11px 14px; border-bottom: 1.5px solid var(--border); vertical-align: top; line-height: 1.55; }
  .dtable tr:last-child td { border-bottom: none; }
  .dtable tr:nth-child(even) td { background: var(--bg); }

  .qtable { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin: 12px 0; overflow: hidden; border-radius: 12px; }
  .qtable th { background: var(--blue1); color: #fff; padding: 10px 12px; text-align: center; font-size: 0.82rem; font-weight: 800; }
  .qtable td { padding: 10px 12px; text-align: center; border-bottom: 1.5px solid var(--border); }
  .qtable tr:nth-child(even) td { background: var(--bg); }
  .qtable tr.tot td { background: var(--blue3); font-weight: 800; color: var(--blue1); }

  /* ── FAQ ── */
  .faq { border: 1.5px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
  .faq-q { padding: 14px 18px; background: var(--blue3); font-weight: 700; font-size: 0.95rem; color: var(--text); display: flex; justify-content: space-between; align-items: center; }
  .faq-q span { color: var(--blue2); font-size: 1.1rem; }
  .faq-a { padding: 14px 18px; font-size: 0.95rem; line-height: 1.7; background: var(--white); color: var(--text2); border-top: 1.5px solid var(--border); font-weight: 600; }

  /* ── KOBO GRID ── */
  .kgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 10px; margin: 14px 0; }
  .kcard { background: var(--blue3); border-radius: 14px; padding: 16px 12px; text-align: center; border: 1.5px solid var(--blue4); }
  .kcard .ke { font-size: 2rem; margin-bottom: 8px; }
  .kcard h4  { font-size: 0.85rem; font-weight: 800; color: var(--blue1); margin-bottom: 4px; }
  .kcard p   { font-size: 0.78rem; color: var(--text2); line-height: 1.5; }

  /* ── CHECK GRID ── */
  .cgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 10px; margin: 14px 0; }
  .citem { background: var(--blue3); border-radius: 12px; padding: 13px 15px; display: flex; align-items: center; gap: 10px; font-size: 0.95rem; font-weight: 700; color: var(--blue1); border: 1.5px solid var(--blue4); }
  .citem::before { content:'✓'; font-size:1.1rem; font-weight:900; }

  /* ── HIGHLIGHT BOX ── */
  .hbox { background: linear-gradient(135deg, var(--blue1), var(--blue2)); color: #fff; border-radius: 18px; padding: 22px; margin: 16px 0; }
  .hbox h4 { font-size: 1.05rem; font-weight: 900; color: #a8ccff; margin-bottom: 10px; }
  .hbox p  { font-size: 0.95rem; line-height: 1.7; color: rgba(255,255,255,0.92); }

  /* ── NUMBERED LIST ── */
  .nlist { list-style: none; margin: 12px 0 16px; counter-reset: nl; }
  .nlist li { counter-increment: nl; display: flex; gap: 14px; padding: 12px 0; border-bottom: 1.5px dashed var(--border); font-size: 0.97rem; line-height: 1.65; align-items: flex-start; }
  .nlist li:last-child { border-bottom: none; }
  .nlist li::before { content: counter(nl); min-width: 32px; height: 32px; border-radius: 50%; background: var(--blue1); color: #fff; font-weight: 900; font-size: 0.88rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }

  /* ── QUESTIONNAIRE BLOCK ── */
  .qform { background: var(--blue3); border-radius: 16px; border: 1.5px solid var(--blue4); margin: 14px 0; overflow: hidden; }
  .qform-hdr { background: var(--blue1); color: #fff; padding: 13px 18px; font-size: 0.92rem; font-weight: 800; }
  .qform-body { padding: 16px 18px; }
  .qitem { padding: 11px 0; border-bottom: 1.5px dashed var(--border); font-size: 0.95rem; line-height: 1.65; }
  .qitem:last-child { border-bottom: none; }
  .qitem-label { font-weight: 700; color: var(--blue1); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .qitem-text  { color: var(--text); }
  .qitem-note  { font-size: 0.82rem; color: var(--text2); font-style: italic; margin-top: 3px; }
  .qitem-opts  { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; }
  .qopt { display: flex; align-items: flex-start; gap: 10px; font-size: 0.9rem; color: var(--text2); padding: 4px 0; }
  .qopt::before { content:'○'; color: var(--blue2); font-size: 1rem; flex-shrink: 0; line-height: 1.3; }
  .qopt.stop::before { content:'⛔'; font-size: 0.85rem; }
  .answer-line { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .aline { border-bottom: 1.5px solid var(--blue2); height: 28px; width: 100%; }

  /* ── QUOTA BOX ── */
  .quota-explain { background: var(--blue3); border-radius: 14px; padding: 16px; border: 1.5px solid var(--blue4); margin: 14px 0; }
  .quota-explain p { font-size: 0.95rem; line-height: 1.7; color: var(--text); margin-bottom: 10px; }
  .quota-explain p:last-child { margin-bottom: 0; }
  .quota-part { display: inline-flex; align-items: center; gap: 8px; background: var(--blue1); color: #fff; border-radius: 10px; padding: 6px 14px; font-size: 0.85rem; font-weight: 800; margin: 4px 4px 4px 0; }

  /* ── BUTTONS ── */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 16px 28px; border-radius: 16px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.05rem; cursor: pointer; border: none; transition: all 0.2s; text-align: center; min-height: 56px; -webkit-tap-highlight-color: transparent; }
  .btn:active { transform: scale(0.97); }
  .btn-go    { background: var(--blue1);  color: #fff; box-shadow: 0 4px 14px rgba(26,74,138,0.30); }
  .btn-go:hover  { background: var(--blue2); }
  .btn-next  { background: #a8ccff; color: var(--blue1); box-shadow: 0 4px 14px rgba(26,74,138,0.20); }
  .btn-next:hover{ background: #88b8ff; }
  .btn-retry { background: var(--amb-bg); color: var(--amber); border: 2px solid var(--amber); }
  .btn-retry:hover{ background: #ffe8b8; }
  .btn-back  { background: var(--bg); color: var(--text2); border: 2px solid var(--border); }
  .btn-back:hover { background: var(--border); }
  .btn[disabled]  { opacity: 0.38; cursor: not-allowed; transform: none !important; box-shadow: none; }
  .btn-full { width: 100%; }
  .start-row { text-align: center; margin-top: 6px; }

  /* ── QUIZ ── */
  .quiz-top { background: linear-gradient(135deg, var(--blue1), var(--blue2)); padding: 20px 22px; display: flex; align-items: center; gap: 14px; }
  .quiz-top .qico { font-size: 2.2rem; flex-shrink: 0; }
  .quiz-top h3 { font-size: 1.1rem; font-weight: 900; color: #fff; margin-bottom: 3px; }
  .quiz-top p  { font-size: 0.88rem; color: rgba(255,255,255,0.78); }
  .quiz-body { padding: 22px; }
  .qblock { margin-bottom: 30px; }
  .qnum  { font-size: 0.78rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; }
  .qtxt  { font-size: 1.05rem; font-weight: 800; color: var(--text); margin-bottom: 16px; line-height: 1.45; }
  .qdiv  { border-top: 1.5px dashed var(--border); margin: 26px 0; }
  .opts  { display: flex; flex-direction: column; gap: 11px; }
  .opt { border: 2.5px solid var(--border); border-radius: 16px; padding: 15px 18px; cursor: pointer; font-size: 0.97rem; font-weight: 600; line-height: 1.5; transition: all 0.18s; background: var(--white); color: var(--text); text-align: left; width: 100%; display: flex; align-items: center; gap: 14px; min-height: 58px; }
  .opt:hover:not([disabled]) { border-color: var(--blue2); background: var(--blue3); }
  .olbl { width: 34px; height: 34px; border-radius: 10px; background: var(--bg); border: 2px solid var(--border); font-weight: 900; font-size: 0.88rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--text2); transition: all 0.18s; }
  .opt.sel   { border-color: var(--blue2); background: var(--blue3); }
  .opt.sel .olbl { background: var(--blue2); border-color: var(--blue2); color: #fff; }
  .opt.corr  { border-color: var(--green) !important; background: var(--grn-bg) !important; color: #0e3d22; }
  .opt.corr .olbl{ background: var(--green); border-color: var(--green); color: #fff; }
  .opt.wrong { border-color: var(--red) !important; background: var(--red-bg) !important; color: var(--red); }
  .opt.wrong .olbl{ background: var(--red); border-color: var(--red); color: #fff; }
  .opt[disabled]{ pointer-events: none; }
  .qfb { display:none; margin-top:12px; border-radius:12px; padding:13px 16px; font-size:0.93rem; line-height:1.65; font-weight:600; }
  .qfb.show { display:block; }
  .qfb.ok  { background: var(--grn-bg); color: #0e3d22; border-left: 5px solid var(--green); }
  .qfb.bad { background: var(--red-bg);  color: #5a1010; border-left: 5px solid var(--red); }
  .qfoot { margin-top: 26px; padding-top: 20px; border-top: 1.5px solid var(--border); }
  .qfoot-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .qscore { font-size: 0.95rem; font-weight: 700; color: var(--text2); }
  .qfoot-btns { display: flex; flex-direction: column; gap: 10px; }

  /* ── RESULT ── */
  .result { text-align: center; padding: 36px 22px; }
  .r-emoji { font-size: 4.5rem; margin-bottom: 14px; line-height: 1; }
  .r-title { font-size: 1.5rem; font-weight: 900; color: var(--text); margin-bottom: 10px; line-height: 1.3; }
  .r-sub   { font-size: 1rem; color: var(--text2); margin-bottom: 22px; line-height: 1.7; max-width: 420px; margin-left: auto; margin-right: auto; }
  .rbar    { background: var(--border); border-radius: 10px; height: 14px; margin: 14px auto 26px; max-width: 300px; overflow: hidden; }
  .rfill   { height: 100%; border-radius: 10px; background: var(--blue2); transition: width 1s ease; }
  .rfill.fail{ background: var(--red); }
  .r-btns  { display: flex; flex-direction: column; gap: 12px; max-width: 360px; margin: 0 auto; }

  /* ── MOBILE ── */
  @media(max-width:500px){
    html { font-size: 17px; }
    .igrid, .twocol { grid-template-columns: 1fr; }
    .prog-wrap { display: none; }
    .card-top, .card-body, .quiz-body { padding: 18px 16px; }
    .hdr { padding: 12px 16px; }
    .dtable { font-size: 0.82rem; }
    .dtable th, .dtable td { padding: 9px 10px; }
    .qtable { font-size: 0.8rem; }
    .btn { font-size: 1rem; padding: 15px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo-txt">ZERKALO SSS<span>Intervyuer Qo'llanmasi</span></div>
    <div class="prog-wrap" id="dots"></div>
  </div>
</header>

<div id="app"></div>

<script>
const PASS = 70;
const LABS = ['A','B','V','G'];

const lessons = [
/* ══════════════ KIRISH ══════════════ */
{
  id:0, ico:"🏠",
  title:"Kirish: Loyihaga Xush Kelibsiz!",
  sub:"Loyiha haqida umumiy ma'lumot va o'qitish tartibi",
  body:`
<div class="box blue"><span class="box-ico">ℹ️</span><div class="box-txt"><strong>Zerkalo Sosiologik Servis</strong> — Toshkent shahridagi tadqiqot kompaniyasi. O'zbekiston va Markaziy Osiyo bozorida sotsiologik va marketing tadqiqotlari o'tkazadi.</div></div>
<h3 class="sub">Ushbu o'qitishda siz bilib olasiz:</h3>
<div class="igrid">
  <div class="icard"><span class="icard-ico">🏦</span><div><h4>Banklar va MFT</h4><p>Bank, bank ilovasi va to'lov xizmatlari nima</p></div></div>
  <div class="icard"><span class="icard-ico">🧠</span><div><h4>TOM nima</h4><p>Ko'meksiz bilimni o'lchash usuli</p></div></div>
  <div class="icard"><span class="icard-ico">📋</span><div><h4>Anketa savollari</h4><p>Savollarni to'g'ri berish tartibi</p></div></div>
  <div class="icard"><span class="icard-ico">🚶</span><div><h4>Dala ishi</h4><p>To'xtatib so'rash va intervyu o'tkazish</p></div></div>
  <div class="icard"><span class="icard-ico">📊</span><div><h4>Kvotalar</h4><p>Kvotani saqlash va skriningdan o'tish</p></div></div>
  <div class="icard"><span class="icard-ico">📱</span><div><h4>Kobo tizimi</h4><p>Kobo ilovasida ishlash ko'rsatmalari</p></div></div>
</div>
<h3 class="sub">O'qitish bosqichlari:</h3>
<div class="steps">
  <div class="step"><div class="step-n">1</div><div class="step-t">Telegram-kanalda materiallarni mustaqil o'rganasiz</div></div>
  <div class="step"><div class="step-n">2</div><div class="step-t">Darhol natija bilan onlayn-testdan o'tasiz</div></div>
  <div class="step"><div class="step-n">3</div><div class="step-t">Tanishlaringiz orasida ikkita taqlid intervyu o'tkazasiz</div></div>
  <div class="step"><div class="step-n">4</div><div class="step-t">Bizdan fikr-mulohaza olasiz</div></div>
  <div class="step"><div class="step-n">5</div><div class="step-t">1 kun davomida dalaga chiqasiz — ishingiz tekshiriladi</div></div>
  <div class="step"><div class="step-n">6</div><div class="step-t">Sifat tasdiqlanganda — ishni davom ettirasiz</div></div>
</div>`,
  qs:[
    {q:"Zerkalo Sosiologik Servis qaysi shaharda joylashgan?",opts:["Samarqand","Toshkent","Namangan","Buxoro"],ok:1,ex:"Zerkalo Sosiologik Servis Toshkent shahrida joylashgan."},
    {q:"O'qitish necha bosqichdan iborat?",opts:["3 bosqich","4 bosqich","6 bosqich","8 bosqich"],ok:2,ex:"O'qitish 6 bosqichdan iborat: materialni o'rganish, test, taqlid intervyu, fikr-mulohaza, dala ishi, sifat tekshiruvi."},
    {q:"O'qitishdan so'ng siz nima qila olasiz?",opts:["Faqat banklar haqida gapira olasiz","Intervyularni ishonchli va to'g'ri o'tkaza olasiz","Faqat kvotalarni to'ldira olasiz","Shunchaki testdan o'ta olasiz"],ok:1,ex:"O'qitishdan so'ng siz ushbu loyiha doirasida intervyularni ishonchli va to'g'ri o'tkaza olasiz."}
  ]
},

/* ══════════════ DARS 1 ══════════════ */
{
  id:1, ico:"🏦",
  title:"1-dars: Banklar, MFT va To'lov Xizmatlari",
  sub:"Moliyaviy tushunchalarni to'g'ri tushunish",
  body:`
<h3 class="sub">Bank nima?</h3>
<p>Bank — omonatlarni qabul qiluvchi, kreditlar beruvchi va kartalar chiqaruvchi moliyaviy tashkilot. <strong>MFT</strong> (mikromoliya tashkilotlari) esa mikrokarzlar beradi.</p>
<div class="box green"><span class="box-ico">✅</span><div class="box-txt"><strong>Ushbu so'rovda banklar ham, MFT ham bo'yicha javoblar qabul qilinadi.</strong><br>Misollar: «Kapitalbank», «Asaka Bank», «Anorbank», «Shaffof Moliya», «TezCoin», «Fortuna Biznes»</div></div>
<h3 class="sub">Bank ilovasi nima?</h3>
<p>Bank ilovasi — muayyan bankning rasmiy mobil ilovasi. Mijozlarga hisoblar, omonatlar, kreditlar va o'tkazmalarni amalga oshirish imkonini beradi. U <strong>faqat bitta bankka</strong> tegishli.</p>
<h3 class="sub">To'lov xizmati nima?</h3>
<p>To'lov xizmati — bank hisobini ochish zaruratisiz tezkor to'lovlar va o'tkazmalar uchun mustaqil platforma.<br><strong>Misollar: Paynet, Click, Payme</strong></p>
<h3 class="sub">Asosiy farq:</h3>
<table class="dtable">
  <tr><th>Bank Ilovasi</th><th>To'lov Xizmati</th></tr>

  <tr><td>Hisoblar, kreditlar, omonatlarni boshqaradi</td><td>Faqat tranzaksiyalar uchun</td></tr>
  <tr><td>Bank hisobi kerak</td><td>Bank hisobi shart emas</td></tr>
  <tr><td>Misol: Kapitalbank App</td><td>Misol: Click, Payme</td></tr>
</table>
<div class="box red"><span class="box-ico">🚫</span><div class="box-txt"><strong>MUHIM!</strong> Bu nomlar faqat sizning tushunishingiz uchun. Respondentlarga bu nomlarni <u>aytmasligingiz</u> kerak.</div></div>
<div class="box red"><span class="box-ico">🚫</span><div class="box-txt"><strong>MUHIM!</strong> Respondentga kredit/omonat joylarini tushuntirmang. Biz uning bilimlar darajasini ko'rsatmasdan bilishimizga qiziqamiz.</div></div>`,
  qs:[

{
  id:4, ico:"🤔",
  title:"4-dars: Respondent Qiynalib Qolsa Nima Qilish Kerak?",
  sub:"Murakkab holatlarni to'g'ri boshqarish",
  body:`
<div class="box amber"><span class="box-ico">⚠️</span><div class="box-txt">Ba'zida respondent javob berishda qiynalishi mumkin. Quyida uch xil vaziyat va har birida nima qilish kerakligi keltirilgan.</div></div>

<h3 class="sub">1-holat: Respondent bir nechta nom aytdi, lekin keyingisini eslay olmayapti</h3>
<div class="box blue"><span class="box-ico">💡</span><div class="box-txt">U aytgan nomlarni yozing. U «eslay olmayapman» degach, qolgan bo'sh kataklarga <strong>«Bilmaydi»</strong> deb yozing.</div></div>

<h3 class="sub">2-holat: Respondent hech qanday nom eslay olmayapti</h3>
<div class="box blue"><span class="box-ico">💡</span><div class="box-txt">Unga biroz vaqt bering. Baribir eslay olmasa — barcha majburiy kataklarga <strong>«Bilmaydi»</strong> deb yozing.</div></div>

<div class="box red"><span class="box-ico">🚨</span><div class="box-txt"><strong>MUHIM!</strong> Agar respondent hech narsani bilmasa — u hazil qilmayotganiga yoki ishtirok etmoqchi emasligiga ishonch hosil qiling. Bunday bo'lsa — so'rovni to'xtating.</div></div>

<h3 class="sub">3-holat: Respondent bank ilovasi yoki to'lov ilovasi nima ekanligini tushunmaydi</h3>
<div class="box blue"><span class="box-ico">💡</span><div class="box-txt">Ilovaning <strong>funksiyalari</strong> orqali tushuntiring — lekin <strong>aniq nomlarni aytmang</strong>.<br><br>Masalan: «Bu — telefonda pul o'tkazish, hisob-kitob qilish uchun ishlatiladigan ilova».</div></div>

<div class="box red"><span class="box-ico">🚫</span><div class="box-txt"><strong>MUHIM!</strong> Agar respondent sizdan so'rasa: «Siz PayMe yoki Click haqida so'rayapsizmi?» — bu savolni tasdiqlash <u>mumkin emas</u>. Ilovaning funksiyalarini yana bir marta tushuntiring, lekin nom aytmang.</div></div>

<h3 class="sub">Qisqacha jadval: Qiyin holat → Nima qilish kerak</h3>
<table class="dtable">
  <tr><th>Holat</th><th>Nima qilish kerak</th></tr>
  <tr><td>Bir nechta nom aytdi, to'xtadi</td><td>Aytganlarini yoz, qolganlariga «Bilmaydi» yoz</td></tr>
  <tr><td>Umuman eslay olmaydi</td><td>Biroz kut, so'ng barcha kataklarga «Bilmaydi» yoz</td></tr>
  <tr><td>Hech narsani bilmaydi (shubhali)</td><td>Hazil emasligiga ishonch hosil qil, kerak bo'lsa to'xtat</td></tr>
  <tr><td>Ilova nima ekanligini bilmaydi</td><td>Funksiyalarini tushuntir, nom aytma</td></tr>

{
  id:6, ico:"📊",
  title:"6-dars: Kvotalar — Qanday Ishlash Kerak",
  sub:"Kvota jadvali tuzilishi va to'ldirish qoidalari",
  body:`
<div class="box amber"><span class="box-ico">⚠️</span><div class="box-txt">Agar kvotalar saqlanmasa, <strong>natijalar buziladi</strong>. Har bir o'tkazilgan so'rovni belgilang va belgilangan sondan oshmang.</div></div>

<h3 class="sub">Kvota jadvali 3 qismdan iborat:</h3>
<div class="quota-explain">
  <p><span class="quota-part">1-qism: Sarlavha</span></p>
  <p>Jadvalning yuqori qismi — xizmat ma'lumoti. Undan siz qaysi shahar, qaysi nuqta va jami nechta respondent oprosiy qilinishi kerakligini bilib olasiz.<br><em>Misol: Qarshi shahri, 2-nuqta (4 dan), jami 15 ta respondent.</em></p>
  <p><span class="quota-part">2-qism: Reja</span></p>
  <p>Jins va yosh bo'yicha oprosiy qilish kerak bo'lgan aniq sonlar. <em>Masalan: 16–24 yoshli 2 ta ayol, 25–40 yoshli 3 ta erkak va hokazo.</em></p>
  <p><span class="quota-part">3-qism: Sizning ijroyingiz</span></p>
  <p>Bu qism <strong>siz uchun</strong>. Har bir bajarilgan so'rovni mos katakka <strong>«1»</strong> raqami bilan belgilang — kvota bajarilishini nazorat qilish uchun.</p>
</div>

<div class="box red"><span class="box-ico">🚨</span><div class="box-txt"><strong>MUHIM!</strong> Har bir o'tkazilgan so'rovni belgilang va belgilangan sondan <u>oshmang</u>!</div></div>

<h3 class="sub">Namuna jadval: Chirchiq shahri</h3>
<p style="font-size:0.88rem;color:var(--text2);margin-bottom:10px;">📍 Nuqta: 3 dan 3 | Jami: 16 respondent</p>
<table class="qtable">
  <tr><th rowspan="2">Jins</th><th colspan="3" style="background:#1038a0;">KVOTA (Reja)</th><th rowspan="2">Jami</th><th colspan="3" style="background:#1e5e3a;">BAJARISH</th><th rowspan="2" style="background:#1e5e3a;">Jami</th></tr>
  <tr><th style="background:#1038a0;">16–24</th><th style="background:#1038a0;">25–40</th><th style="background:#1038a0;">41–59</th><th style="background:#1e5e3a;">16–24</th><th style="background:#1e5e3a;">25–40</th><th style="background:#1e5e3a;">41–59</th></tr>
  <tr><td><strong>Erkaklar</strong></td><td>2</td><td>4</td><td>2</td><td><strong>8</strong></td><td></td><td></td><td></td><td></td></tr>
  <tr><td><strong>Ayollar</strong></td><td>2</td><td>4</td><td>2</td><td><strong>8</strong></td><td></td><td></td><td></td><td></td></tr>
  <tr class="tot"><td>JAMI</td><td>4</td><td>8</td><td>4</td><td><strong>16</strong></td><td></td><td></td><td></td><td></td></tr>
</table>

<h3 class="sub">Nuqtani qanday tanlash kerak:</h3>
<ul class="clist">
  <li>Nuqta <strong>gavjum</strong> bo'lishi kerak</li>
  <li>Banklar yoki ularning reklamalari yaqinida <strong>ishlash mumkin emas</strong></li>
  <li>Nuqtalar shaharning <strong>turli qismlarida</strong> joylashishi kerak</li>
  <li>Nuqta tanlovini Zerkalo <strong>menajeri bilan muvofiqlashtiring</strong></li>
</ul>`,
  qs:[
    {q:"Kvota jadvalining 3-qismi nima uchun kerak?",opts:["Menejerga hisobot berish uchun","Har bir bajarilgan so'rovni belgilab, kvota bajarilishini nazorat qilish uchun","Faqat yakuniy hisob uchun","Ish haqini hisoblash uchun"],ok:1,ex:"3-qism — sizning ijroyingiz. Har bir bajarilgan so'rovni mos katakka «1» bilan belgilang — kvota nazorati uchun."},
    {q:"Chirchiq shahrida jami nechta respondent oprosiy qilinishi kerak?",opts:["8 ta","12 ta","16 ta","20 ta"],ok:2,ex:"Chirchiq shahrida jami 16 ta respondent: 8 erkak + 8 ayol."},
    {q:"Bank yonida ishlash mumkinmi?",opts:["Ha, bu qulay joy","Ha, agar bank yopiq bo'lsa","Yo'q, banklar yoki ularning reklamalari yonida ishlash mumkin emas","Ha, agar kvota to'lmagan bo'lsa"],ok:2,ex:"Banklar yoki ularning reklamalari yonida ishlash mumkin emas — TOM natijalariga ta'sir qiladi."}
  ]
},

{
  id:7, ico:"🚶",
  title:"7-dars: Dala Ishi — To'xtatib So'rash",
  sub:"Yaqinlashish va tez-tez so'raladigan savollarga javoblar",
  body:`
<div class="twocol">
  <div class="tcol"><h4>✅ To'g'ri joylashish:</h4><ul><li>Gavjum joylarda ishlang</li><li>Neytral lokatsiyani tanlang</li><li>Moliyaviy reklama ko'rinmasin</li></ul></div>
  <div class="tcol"><h4>🚫 Joiz emas:</h4><ul><li>Banklar yonida ishlash</li><li>Bank reklamalari ko'rinib turgan joyda</li><li>Moliyaviy tashkilotlar yaqinida</li></ul></div>
</div>
<div class="box green"><span class="box-ico">😊</span><div class="box-txt">O'zingizni <strong>tinch va ishonchli tarzda</strong> tanishtiring. Bejdik (ko'krak nishoni) ko'rinib turishi kerak.</div></div>

<h3 class="sub">Tez-tez so'raladigan savollarga javoblar:</h3>
<div class="faq"><div class="faq-q">So'rovni kim o'tkazmoqda? <span>→</span></div><div class="faq-a">«Zerkalo Sosiologik Servis» kompaniyasi, Toshkent shahri. Biz sotsiologik va marketing tadqiqotlari o'tkazamiz — odamlarning fikrini o'rganamiz va kompaniyalarga foydalanuvchilar ehtiyojlarini yaxshiroq tushunishga yordam beramiz.</div></div>
<div class="faq"><div class="faq-q">Buyurtmachi kim? <span>→</span></div><div class="faq-a">Moliya bozorini o'rganayotgan kompaniya. Respondentlarning aniq javoblari buyurtmachiga uzatilmaydi — natijalar faqat umumlashtirilgan holda tahlil qilinadi.</div></div>
<div class="faq"><div class="faq-q">Militsiyani chaqiraman. <span>→</span></div><div class="faq-a">Siz bunga haqlisiz. Bizning so'rovimiz rasmiy tarzda o'tkaziladi va mahalliy hokimiyat xabardor. Bizda qo'llab-quvvatlash xati va intervyuerlarning xizmat guvohnomasi mavjud.</div></div>
<div class="faq"><div class="faq-q">Yozib olish nima uchun? <span>→</span></div><div class="faq-a">Audio yozuv faqat intervyu sifatini nazorat qilish uchun ishlatiladi. Loyiha rahbarlari yozuvlarni tanlab tinglaydi — savollar to'g'ri berilganiga va javoblar aniq qayd etilganiga ishonch hosil qilish uchun. Bu yozuvlar e'lon qilinmaydi va uchinchi shaxslarga uzatilmaydi.</div></div>
<div class="faq"><div class="faq-q">Ma'lumotlar qanday ishlatiladi? <span>→</span></div><div class="faq-a">Barcha javoblar faqat umumlashtirilgan holda, ism, telefon yoki boshqa shaxsiy ma'lumotsiz ishlatiladi. Hisobotlarda faqat umumiy natijalar ko'rsatiladi.</div></div>
<div class="faq"><div class="faq-q">Qancha vaqt ketadi? <span>→</span></div><div class="faq-a">6–8 daqiqa. Biz so'rovni tez o'tkazishga harakat qilamiz. Agar xohlasangiz, istalgan vaqtda to'xtatishingiz mumkin.</div></div>
<div class="faq"><div class="faq-q">Bu reklama emasmi? <span>→</span></div><div class="faq-a">Yo'q, bu reklama emas va xizmat sotish emas. Biz hech narsa sotmaymiz va hisob ochish yoki karta rasmiylashtirish taklif qilmaymiz. Bu faqat odamlar qaysi banklar va ilovalarni bilishini o'rganuvchi tadqiqot.</div></div>
<div class="faq"><div class="faq-q">Nima uchun aynan men? <span>→</span></div><div class="faq-a">Biz ko'chada tasodifiy ravishda odamlarni so'roq qilamiz — ob'ektiv manzara olish uchun. Bizga turli odamlarning fikri muhim, shuning uchun intervyuerlar ma'lum mezonlar, masalan yosh bo'yicha yo'lovchilarni tanlaydi.</div></div>
<div class="box blue"><span class="box-ico">ℹ️</span><div class="box-txt">Rad etilsa — <strong>rahmat aytib, keyingisiga o'ting.</strong></div></div>`,
  qs:[
    {q:"Respondent «Militsiyani chaqiraman» desa nima qilasiz?",opts:["Qo'rqib ketaman va ketaman","So'rovni rasmiy ekanligi, hokimiyat xabardorligi va qo'llab-quvvatlash xati borligini tushuntiraman","Anketani yopaman","Menejerga xabar beraman"],ok:1,ex:"So'rovimiz rasmiy. Mahalliy hokimiyat xabardor, bizda qo'llab-quvvatlash xati va xizmat guvohnomasi mavjud — buni tushuntiring."},
    {q:"Respondent «Bu reklama emasmi?» deb so'rasa nima javob berish kerak?",opts:["«Ha, bu reklama»","«Yo'q, bu faqat tadqiqot — biz hech narsa sotmaymiz»","«Bilmayman»","«Ha, lekin bepul»"],ok:1,ex:"To'g'ri javob: bu reklama emas va xizmat sotish emas — faqat odamlar qaysi banklar va ilovalarni bilishini o'rganuvchi tadqiqot."},
    {q:"Intervyu qancha vaqt davom etadi?",opts:["2–3 daqiqa","15–20 daqiqa","6–8 daqiqa","30 daqiqa"],ok:2,ex:"Intervyu 6–8 daqiqa davom etadi."},
    {q:"Respondent so'rovdan rad etsa nima qilish kerak?",opts:["Uni ishontirish uchun yana urinish","Rahmat aytib, keyingi respondentga o'tish","Anketani yopmasdan ketish","Menejerga zudlik bilan xabar berish"],ok:1,ex:"Rad etilsa — rahmat aytib, keyingisiga o'ting."}
  ]
},

let S = { lesson:0, unlocked:0, phase:'lesson', ans:{}, submitted:false };

/* ══════════════ DOTS ══════════════ */
function renderDots(){
  document.getElementById('dots').innerHTML = lessons.map((l,i)=>{
    let c='pdot';
    if(i<S.unlocked) c='pdot done';
    else if(i===S.lesson) c='pdot active';
    return `<div class="${c}">${i===0?'K':i}</div>`;
  }).join('');
}

/* ══════════════ RENDER ══════════════ */
function render(){
  renderDots();
  const app=document.getElementById('app');
  const L=lessons[S.lesson];

  if(S.phase==='lesson'){
    app.innerHTML=`<div class="page">
      <div class="card">
        <div class="card-top">
          <div class="card-emoji">${L.ico}</div>
          <div><h2>${L.title}</h2><p>${L.sub}</p></div>
        </div>
        <div class="card-body">${L.body}</div>
      </div>
      <div class="start-row">
        <button class="btn btn-go btn-full" onclick="goQuiz()">📝 &nbsp;Testga o'tish →</button>
      </div>
    </div>`;
  }
  else if(S.phase==='quiz'){
    const qs=L.qs;
    const answered=Object.keys(S.ans).length;
    const allDone=answered===qs.length;

    const qsHTML=qs.map((q,qi)=>{
      const chosen=S.ans[qi];
      const optsHTML=q.opts.map((opt,oi)=>{
        let cls='opt', dis='';
        if(S.submitted){
          dis='disabled';
          if(oi===q.ok) cls+=' corr';
          else if(chosen===oi) cls+=' wrong';
        } else {
          if(chosen===oi) cls+=' sel';
        }
        return `<button class="${cls}" ${dis} onclick="pick(${qi},${oi})">
          <span class="olbl">${LABS[oi]}</span>${opt}
        </button>`;
      }).join('');
      let fb='';
      if(S.submitted){
        const ok=chosen===q.ok;
        fb=`<div class="qfb show ${ok?'ok':'bad'}">${ok?"✅ To'g'ri!":"❌ Noto'g'ri."} ${q.ex}</div>`;
      }
      return `<div class="qblock">
        <div class="qnum">Savol ${qi+1} / ${qs.length}</div>
        <div class="qtxt">${q.q}</div>
        <div class="opts">${optsHTML}</div>${fb}
      </div>`;
    }).join('<div class="qdiv"></div>');

    let footer='';
    if(!S.submitted){
      footer=`<div class="qfoot">
        <div class="qfoot-top"><span class="qscore">${answered} / ${qs.length} javob berildi</span></div>
        <button class="btn btn-go btn-full" onclick="submit()" ${allDone?'':'disabled'}>✓ &nbsp;Tekshirish</button>
      </div>`;
    } else {
      const score=qs.filter((_,i)=>S.ans[i]===qs[i].ok).length;
      const pct=Math.round(score/qs.length*100);
      const pass=pct>=PASS;
      const isLast=S.lesson===lessons.length-1;
      footer=`<div class="qfoot">
        <div class="qfoot-top"><span class="qscore">Natija: <strong>${score}/${qs.length}</strong> (${pct}%)</span></div>
        <div class="qfoot-btns">
          ${pass&&!isLast?`<button class="btn btn-next btn-full" onclick="nextLesson()">Keyingi darsga o'tish →</button>`:''}
          ${pass&&isLast?`<button class="btn btn-next btn-full" onclick="finish()">🏆 &nbsp;Tugatish</button>`:''}
          <button class="btn btn-retry btn-full" onclick="retry()">🔄 &nbsp;Qayta urinish</button>
          <button class="btn btn-back btn-full" onclick="backLesson()">📖 &nbsp;Darsni qayta o'qish</button>
        </div>
      </div>`;
    }

    app.innerHTML=`<div class="page">
      <div class="card">
        <div class="quiz-top">
          <div class="qico">📝</div>
          <div><h3>${L.title} — Test</h3><p>Keyingi darsga o'tish uchun kamida ${PASS}% to'g'ri javob bering</p></div>
        </div>
        <div class="quiz-body">${qsHTML}${footer}</div>
      </div>
    </div>`;
  }
  else if(S.phase==='done'){
    app.innerHTML=`<div class="page">
      <div class="card">
        <div style="text-align:center;padding:36px 22px;">
          <div style="font-size:4.5rem;margin-bottom:14px;">🏆</div>
          <div style="font-size:1.5rem;font-weight:900;color:var(--text);margin-bottom:10px;">Tabriklaymiz!<br>Barcha darslar tugadi!</div>
          <div class="rbar"><div class="rfill" style="width:100%"></div></div>
          <div style="font-size:1rem;color:var(--text2);margin-bottom:22px;line-height:1.7;">Siz barcha 11 ta darsni va testlarni muvaffaqiyatli yakunladingiz. Endi dala ishiga to'liq tayyorsiz!</div>
          <div style="display:flex;flex-direction:column;gap:12px;max-width:360px;margin:0 auto;">
            <button class="btn btn-back btn-full" onclick="backLesson()">📖 &nbsp;Oxirgi darsni ko'rish</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  window.scrollTo({top:0,behavior:'smooth'});
}

function goQuiz()    { S.phase='quiz'; S.ans={}; S.submitted=false; render(); }
function backLesson(){ S.phase='lesson'; render(); }
function pick(qi,oi) { if(!S.submitted){ S.ans[qi]=oi; render(); } }
function submit(){
  if(Object.keys(S.ans).length<lessons[S.lesson].qs.length) return;
  S.submitted=true; render();
}
function retry()     { S.phase='quiz'; S.ans={}; S.submitted=false; render(); }
function nextLesson(){
  const n=S.lesson+1;
  if(n<lessons.length){
    if(S.unlocked<n) S.unlocked=n;
    S.lesson=n; S.phase='lesson'; S.ans={}; S.submitted=false; render();
  }
}
function finish(){ S.phase='done'; render(); }

render();
</script>
</body>
</html>
