<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
<title>Intervyuer Qo'llanmasi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #fdf8f2;
    --cream:    #fff9f2;
    --warm1:    #3d6b4f;   /* deep green */
    --warm2:    #5a9470;   /* medium green */
    --warm3:    #e8f4ec;   /* light green bg */
    --amber:    #c8790a;   /* amber accent */
    --amber-bg: #fff4e0;
    --red:      #b83232;
    --red-bg:   #fdf0f0;
    --text:     #2a2218;
    --text2:    #5a4e40;
    --border:   #e0d5c5;
    --white:    #ffffff;
    --shadow:   0 4px 20px rgba(60,40,10,0.10);
    --shadow2:  0 2px 10px rgba(60,40,10,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { font-size: 18px; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* ── HEADER ─────────────────────────────── */
  header {
    background: var(--warm1);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: 0 3px 16px rgba(0,0,0,0.18);
  }
  .hdr {
    max-width: 700px;
    margin: 0 auto;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .logo-txt {
    font-size: 1.1rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .logo-txt span { color: #ffd48a; }

  /* progress pills */
  .prog-wrap { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
  .pdot {
    min-width: 34px; height: 34px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.78rem;
    color: rgba(255,255,255,0.45);
    transition: all 0.3s;
    padding: 0 6px;
  }
  .pdot.done  { background: #ffd48a; border-color: #ffd48a; color: var(--warm1); }
  .pdot.active{ background: #fff;    border-color: #fff;    color: var(--warm1); }

  /* ── MAIN WRAPPER ────────────────────────── */
  #app { max-width: 700px; margin: 0 auto; padding: 20px 14px 80px; }

  .page { animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  /* ── LESSON CARD ─────────────────────────── */
  .card {
    background: var(--white);
    border-radius: 22px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
    overflow: hidden;
    border: 1.5px solid var(--border);
  }

  .card-top {
    background: linear-gradient(135deg, var(--warm1) 0%, var(--warm2) 100%);
    padding: 22px 22px 18px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .card-emoji {
    font-size: 2.4rem;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .card-top h2 {
    font-size: 1.22rem;
    font-weight: 900;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .card-top p {
    font-size: 0.92rem;
    color: rgba(255,255,255,0.78);
    line-height: 1.5;
  }

  .card-body { padding: 22px; }
  .card-body p { font-size: 1rem; line-height: 1.75; color: var(--text); margin-bottom: 14px; }
  .card-body strong { font-weight: 800; }

  /* ── SUBHEADING ─────────────────────────── */
  h3.sub {
    font-size: 1.05rem;
    font-weight: 800;
    color: var(--warm1);
    margin: 24px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h3.sub::before {
    content: '';
    width: 5px; height: 22px;
    background: var(--amber);
    border-radius: 4px;
    flex-shrink: 0;
  }

  /* ── ALERT BOXES ─────────────────────────── */
  .box {
    border-radius: 14px;
    padding: 16px 18px;
    margin: 14px 0;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-size: 0.97rem;
    line-height: 1.7;
  }
  .box-ico { font-size: 1.4rem; flex-shrink: 0; margin-top: 1px; }
  .box-txt strong { font-weight: 800; display: block; margin-bottom: 3px; }
  .box.green  { background: var(--warm3);  border-left: 5px solid var(--warm2); color: #1a3d26; }
  .box.amber  { background: var(--amber-bg); border-left: 5px solid var(--amber); color: #5a3500; }
  .box.red    { background: var(--red-bg);   border-left: 5px solid var(--red);   color: #5a1010; }
  .box.blue   { background: #eef4ff;         border-left: 5px solid #4a7fc1;      color: #1a2e5a; }

  /* ── CHECKLIST ───────────────────────────── */
  .clist { list-style: none; margin: 10px 0 16px; }
  .clist li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1.5px dashed var(--border);
    font-size: 0.98rem;
    line-height: 1.65;
  }
  .clist li:last-child { border-bottom: none; }
  .clist li::before { content: '✓'; color: var(--warm2); font-weight: 900; font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
  .clist li.no::before { content: '✗'; color: var(--red); }

  /* ── STEPS ───────────────────────────────── */
  .steps { margin: 14px 0; }
  .step {
    display: flex;
    gap: 14px;
    margin-bottom: 14px;
    align-items: flex-start;
  }
  .step-n {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--warm1);
    color: #fff;
    font-weight: 900;
    font-size: 0.95rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .step-t { font-size: 0.98rem; line-height: 1.65; padding-top: 6px; }

  /* ── INTRO GRID ──────────────────────────── */
  .igrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
  .icard {
    background: var(--warm3);
    border-radius: 14px;
    padding: 14px 15px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    border: 1.5px solid #c8e0cf;
  }
  .icard-ico { font-size: 1.5rem; flex-shrink: 0; }
  .icard h4 { font-size: 0.88rem; font-weight: 800; color: var(--warm1); margin-bottom: 2px; }
  .icard p  { font-size: 0.82rem; color: var(--text2); line-height: 1.5; }

  /* ── TWO-COL ─────────────────────────────── */
  .twocol { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
  .tcol {
    background: var(--bg);
    border-radius: 14px;
    padding: 15px;
    border: 1.5px solid var(--border);
  }
  .tcol h4 { font-size: 0.9rem; font-weight: 800; color: var(--text); margin-bottom: 10px; }
  .tcol ul { list-style: none; }
  .tcol ul li { font-size: 0.88rem; line-height: 1.6; color: var(--text2); padding: 3px 0; }
  .tcol ul li::before { content: '• '; color: var(--warm2); font-weight: 900; }

  /* ── TABLE ───────────────────────────────── */
  .dtable { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin: 14px 0; border-radius: 12px; overflow: hidden; border: 1.5px solid var(--border); }
  .dtable th { background: var(--warm1); color: #fff; padding: 12px 14px; font-size: 0.85rem; font-weight: 800; text-align: left; }
  .dtable td { padding: 11px 14px; border-bottom: 1.5px solid var(--border); vertical-align: top; line-height: 1.55; }
  .dtable tr:last-child td { border-bottom: none; }
  .dtable tr:nth-child(even) td { background: var(--bg); }

  .qtable { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin: 12px 0; overflow: hidden; border-radius: 12px; }
  .qtable th { background: var(--warm1); color: #fff; padding: 10px 12px; text-align: center; font-size: 0.82rem; font-weight: 800; }
  .qtable td { padding: 10px 12px; text-align: center; border-bottom: 1.5px solid var(--border); }
  .qtable tr:nth-child(even) td { background: var(--bg); }
  .qtable tr.tot td { background: var(--warm3); font-weight: 800; color: var(--warm1); }

  /* ── FAQ ─────────────────────────────────── */
  .faq { border: 1.5px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
  .faq-q { padding: 14px 18px; background: var(--bg); font-weight: 700; font-size: 0.95rem; color: var(--text); display: flex; justify-content: space-between; align-items: center; }
  .faq-q span { color: var(--amber); }
  .faq-a { padding: 14px 18px; font-size: 0.95rem; line-height: 1.65; background: var(--white); color: var(--text2); border-top: 1.5px solid var(--border); font-weight: 600; }

  /* ── KOBO GRID ───────────────────────────── */
  .kgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin: 14px 0; }
  .kcard { background: var(--warm3); border-radius: 14px; padding: 16px 12px; text-align: center; border: 1.5px solid #c8e0cf; }
  .kcard .ke { font-size: 2rem; margin-bottom: 8px; }
  .kcard h4 { font-size: 0.85rem; font-weight: 800; color: var(--warm1); margin-bottom: 4px; }
  .kcard p  { font-size: 0.78rem; color: var(--text2); line-height: 1.5; }

  /* ── CHECK GRID ──────────────────────────── */
  .cgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin: 14px 0; }
  .citem { background: var(--warm3); border-radius: 12px; padding: 13px 15px; display: flex; align-items: center; gap: 10px; font-size: 0.95rem; font-weight: 700; color: var(--warm1); border: 1.5px solid #c8e0cf; }
  .citem::before { content: '✓'; font-size: 1.1rem; font-weight: 900; }

  /* ── HIGHLIGHT BOX ───────────────────────── */
  .hbox {
    background: linear-gradient(135deg, var(--warm1), var(--warm2));
    color: #fff;
    border-radius: 18px;
    padding: 22px 22px;
    margin: 16px 0;
  }
  .hbox h4 { font-size: 1.05rem; font-weight: 900; color: #ffd48a; margin-bottom: 10px; }
  .hbox p  { font-size: 0.95rem; line-height: 1.7; color: rgba(255,255,255,0.9); }

  /* ── BUTTONS ─────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px 28px;
    border-radius: 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1.05rem;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-align: center;
    min-height: 56px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); }
  .btn-go    { background: var(--warm1); color: #fff; box-shadow: 0 4px 14px rgba(61,107,79,0.35); }
  .btn-go:hover { background: var(--warm2); }
  .btn-ok    { background: var(--warm1); color: #fff; box-shadow: 0 4px 14px rgba(61,107,79,0.35); }
  .btn-ok:hover { background: var(--warm2); }
  .btn-next  { background: #ffd48a; color: var(--warm1); box-shadow: 0 4px 14px rgba(200,121,10,0.3); }
  .btn-next:hover { background: #ffc460; }
  .btn-retry { background: var(--amber-bg); color: var(--amber); border: 2px solid var(--amber); }
  .btn-retry:hover { background: #ffe8b8; }
  .btn-back  { background: var(--bg); color: var(--text2); border: 2px solid var(--border); }
  .btn-back:hover { background: var(--border); }
  .btn[disabled] { opacity: 0.38; cursor: not-allowed; transform: none !important; box-shadow: none; }
  .btn-full { width: 100%; }

  /* ── START ROW ───────────────────────────── */
  .start-row { text-align: center; margin-top: 6px; }

  /* ── QUIZ ────────────────────────────────── */
  .quiz-top {
    background: linear-gradient(135deg, var(--warm1), var(--warm2));
    padding: 20px 22px;
    display: flex; align-items: center; gap: 14px;
  }
  .quiz-top .qico { font-size: 2.2rem; flex-shrink: 0; }
  .quiz-top h3 { font-size: 1.1rem; font-weight: 900; color: #fff; margin-bottom: 3px; }
  .quiz-top p  { font-size: 0.88rem; color: rgba(255,255,255,0.78); }

  .quiz-body { padding: 22px; }

  .qblock { margin-bottom: 30px; }
  .qblock:last-of-type { margin-bottom: 0; }
  .qnum  { font-size: 0.8rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; }
  .qtxt  { font-size: 1.05rem; font-weight: 800; color: var(--text); margin-bottom: 16px; line-height: 1.45; }
  .qdiv  { border-top: 1.5px dashed var(--border); margin: 26px 0; }

  /* options */
  .opts  { display: flex; flex-direction: column; gap: 11px; }
  .opt {
    border: 2.5px solid var(--border);
    border-radius: 16px;
    padding: 15px 18px;
    cursor: pointer;
    font-size: 0.97rem;
    font-weight: 600;
    line-height: 1.5;
    transition: all 0.18s;
    background: var(--white);
    color: var(--text);
    text-align: left;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 58px;
    -webkit-tap-highlight-color: transparent;
  }
  .opt:hover:not([disabled]) { border-color: var(--warm2); background: var(--warm3); }
  .olbl {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: var(--bg);
    border: 2px solid var(--border);
    font-weight: 900; font-size: 0.88rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--text2);
    transition: all 0.18s;
  }
  .opt.sel   { border-color: var(--warm2); background: var(--warm3); }
  .opt.sel .olbl { background: var(--warm2); border-color: var(--warm2); color: #fff; }
  .opt.corr  { border-color: var(--warm2) !important; background: var(--warm3) !important; color: #1a3d26; }
  .opt.corr .olbl { background: var(--warm2); border-color: var(--warm2); color: #fff; }
  .opt.wrong { border-color: var(--red) !important; background: var(--red-bg) !important; color: var(--red); }
  .opt.wrong .olbl { background: var(--red); border-color: var(--red); color: #fff; }
  .opt[disabled] { pointer-events: none; }

  .qfb { display: none; margin-top: 12px; border-radius: 12px; padding: 13px 16px; font-size: 0.93rem; line-height: 1.65; font-weight: 600; }
  .qfb.show { display: block; }
  .qfb.ok   { background: var(--warm3); color: #1a3d26; border-left: 5px solid var(--warm2); }
  .qfb.bad  { background: var(--red-bg); color: #5a1010; border-left: 5px solid var(--red); }

  /* quiz footer */
  .qfoot {
    margin-top: 26px;
    padding-top: 20px;
    border-top: 1.5px solid var(--border);
  }
  .qfoot-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
  }
  .qscore { font-size: 0.95rem; font-weight: 700; color: var(--text2); }
  .qfoot-btns { display: flex; flex-direction: column; gap: 10px; }

  /* ── RESULT BANNER ───────────────────────── */
  .result {
    text-align: center;
    padding: 36px 22px;
  }
  .r-emoji { font-size: 4.5rem; margin-bottom: 14px; line-height: 1; }
  .r-title { font-size: 1.5rem; font-weight: 900; color: var(--text); margin-bottom: 10px; line-height: 1.3; }
  .r-sub   { font-size: 1rem; color: var(--text2); margin-bottom: 22px; line-height: 1.7; max-width: 420px; margin-left: auto; margin-right: auto; }
  .rbar    { background: var(--border); border-radius: 10px; height: 14px; margin: 14px auto 26px; max-width: 300px; overflow: hidden; }
  .rfill   { height: 100%; border-radius: 10px; background: var(--warm2); transition: width 1s ease; }
  .rfill.fail { background: var(--red); }
  .r-btns  { display: flex; flex-direction: column; gap: 12px; max-width: 360px; margin: 0 auto; }

  /* ── SCROLLBAR ───────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── MOBILE ──────────────────────────────── */
  @media (max-width: 500px) {
    html { font-size: 17px; }
    .igrid  { grid-template-columns: 1fr; }
    .twocol { grid-template-columns: 1fr; }
    .prog-wrap { display: none; }
    .card-top { padding: 18px 16px; }
    .card-body, .quiz-body { padding: 18px 16px; }
    .hdr { padding: 12px 16px; }
    .dtable { font-size: 0.82rem; }
    .dtable th, .dtable td { padding: 9px 10px; }
    .qtable  { font-size: 0.8rem; }
    .btn { font-size: 1rem; padding: 15px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo-txt">ZERKALO<br><span>Intervyuer Qo'llanmasi</span></div>
    <div class="prog-wrap" id="dots"></div>
  </div>
</header>

<div id="app"></div>

<script>
const PASS = 70;

const lessons = [
  {
    id:0, ico:"🏠",
    title:"Kirish: Loyihaga Xush Kelibsiz!",
    sub:"Loyiha haqida umumiy ma'lumot va o'qitish tartibi",
    body:`
<div class="box blue"><span class="box-ico">ℹ️</span><div class="box-txt"><strong>Zerkalo Sosiologik Servis</strong> — Toshkent shahridagi tadqiqot kompaniyasi. O'zbekiston va Markaziy Osiyo bozorida faoliyat yuritadi.</div></div>

<h3 class="sub">Ushbu o'qitishda siz bilib olasiz:</h3>
<div class="igrid">
  <div class="icard"><span class="icard-ico">🏦</span><div><h4>Banklar va MFT</h4><p>Bank, bank ilovasi va to'lov xizmatlari nima</p></div></div>
  <div class="icard"><span class="icard-ico">🧠</span><div><h4>TOM nima</h4><p>Ko'meksiz bilimni o'lchash usuli</p></div></div>
  <div class="icard"><span class="icard-ico">📝</span><div><h4>Anketa savollari</h4><p>Savollarni to'g'ri berish tartibi</p></div></div>
  <div class="icard"><span class="icard-ico">🚶</span><div><h4>Dala ishi</h4><p>To'xtatib so'rash va intervyu o'tkazish</p></div></div>
  <div class="icard"><span class="icard-ico">📊</span><div><h4>Kvotalar</h4><p>Kvotani saqlash va skriningdan o'tish</p></div></div>
  <div class="icard"><span class="icard-ico">📱</span><div><h4>Kobo tizimi</h4><p>Kobo ilovasida ishlash ko'rsatmalari</p></div></div>
</div>

<h3 class="sub">O'qitish bosqichlari:</h3>
<div class="steps">
  <div class="step"><div class="step-n">1</div><div class="step-t">Telegram-kanalda materiallarni mustaqil o'rganasiz</div></div>
  <div class="step"><div class="step-n">2</div><div class="step-t">Darhol natija bilan onlayn-testdan o'tasiz</div></div>
  <div class="step"><div class="step-n">3</div><div class="step-t">Tanishlaringiz orasida ikkita taqlid intervyu o'tkazasiz</div></div>
  <div class="step"><div class="step-n">4</div><div class="step-t">Bizdan fikr-mulohaza olasiz</div></div>
  <div class="step"><div class="step-n">5</div><div class="step-t">1 kun davomida dalaga chiqasiz — ishingiz tekshiriladi</div></div>
  <div class="step"><div class="step-n">6</div><div class="step-t">Sifat tasdiqlanganda — ishni davom ettirasiz</div></div>
</div>`,
    qs:[
      {q:"Zerkalo Sosiologik Servis qaysi shaharda joylashgan?",opts:["Samarqand","Toshkent","Namangan","Buxoro"],ok:1,ex:"Zerkalo Sosiologik Servis Toshkent shahrida joylashgan."},
      {q:"O'qitish necha bosqichdan iborat?",opts:["3 bosqich","4 bosqich","6 bosqich","8 bosqich"],ok:2,ex:"O'qitish 6 bosqichdan iborat: materialni o'rganish, test, taqlid intervyu, fikr-mulohaza, dala ishi, sifat tekshiruvi."},
      {q:"O'qitishdan so'ng siz nima qila olasiz?",opts:["Faqat banklar haqida gapira olasiz","Intervyularni ishonchli va to'g'ri o'tkaza olasiz","Faqat kvotalarni to'ldira olasiz","Shunchaki testdan o'ta olasiz"],ok:1,ex:"O'qitishdan so'ng siz ushbu loyiha doirasida intervyularni ishonchli va to'g'ri o'tkaza olasiz."}
    ]
  },
  {
    id:1, ico:"🏦",
    title:"1-dars: Banklar, MFT va To'lov Xizmatlari",
    sub:"Moliyaviy tushunchalarni to'g'ri tushunish",
    body:`
<h3 class="sub">Bank nima?</h3>
<p>Bank — omonatlarni qabul qiluvchi, kreditlar beruvchi va kartalar chiqaruvchi moliyaviy tashkilot. <strong>MFT</strong> (mikromoliya tashkilotlari) esa mikrokarzlar beradi.</p>
<div class="box green"><span class="box-ico">✅</span><div class="box-txt"><strong>Ushbu so'rovda banklar ham, MFT ham bo'yicha javoblar qabul qilinadi.</strong><br>Misollar: «Kapitalbank», «Asaka Bank», «Anorbank», «Shaffof Moliya», «TezCoin», «Fortuna Biznes»</div></div>

<h3 class="sub">Bank ilovasi nima?</h3>
<p>Bank ilovasi — muayyan bankning rasmiy mobil ilovasi. Mijozlarga hisoblar, omonatlar, kreditlar va o'tkazmalarni amalga oshirish imkonini beradi. U <strong>faqat bitta bankka</strong> tegishli.</p>

<h3 class="sub">To'lov xizmati nima?</h3>
<p>To'lov xizmati — bank hisobini ochish zaruratisiz tezkor to'lovlar va o'tkazmalar uchun mustaqil platforma.<br><strong>Misollar: Paynet, Click, Payme</strong></p>

<h3 class="sub">Asosiy farq:</h3>

  <tr><td>Hisoblar, kreditlar, omonatlarni boshqaradi</td><td>Faqat tranzaksiyalar uchun</td></tr>
  <tr><td>Bank hisobi kerak</td><td>Bank hisobi shart emas</td></tr>
  <tr><td>Misol: Kapitalbank App</td><td>Misol: Click, Payme</td></tr>
</table>

<div class="box red"><span class="box-ico">🚫</span><div class="box-txt"><strong>MUHIM!</strong> Bu nomlar faqat sizning tushunishingiz uchun. Respondentlarga bu nomlarni <u>aytmasligingiz</u> kerak.</div></div>

<h3 class="sub">Kreditlar va omonatlar qayerda?</h3>
<p>Kreditlar va mikrokarzlarni banklarda va MFTlarda olish mumkin. Omonatlar va depozitlar banklarda va ba'zi yirik MFTlarda ochiladi.</p>

</div>

<div class="box red"><span class="box-ico">⚠️</span><div class="box-txt">Talablar buzilganda anketa <strong>xato (brak)</strong> deb tan olinishi mumkin. Oqibatlar: fikr-mulohaza, qayta o'qitish, anketalarni bekor qilish yoki chetlashtirish.</div></div>

<div class="hbox"><h4>💪 Mas'uliyatli yondashuv</h4><p>Ishga e'tibor va professionallik bilan yondashishingizni so'raymiz. Mas'uliyatli yondashuv bilan sizda xato anketalar bo'lmasligiga va barcha anketalar birinchi marta qabul qilinishiga aminmiz.</p></div>`,
    qs:[
      {q:"Sifat nazoratida nechta parametr tekshiriladi?",opts:["3 ta","5 ta","7 ta","10 ta"],ok:2,ex:"7 ta parametr tekshiriladi: audio yozuv, GPS, davomiylik, skrining to'g'riligi, kvotalar, javoblar so'zma-sozligi, ko'rsatmalar yo'qligi."},
      {q:"Anketa «brak» deb topilsa qanday oqibatlar bo'ladi?",opts:["Faqat ogohlantiriladi","Hech narsa bo'lmaydi","Fikr-mulohaza, qayta o'qitish, bekor qilish yoki chetlashtirish","Pul jarima to'lanadi"],ok:2,ex:"Oqibatlar: fikr-mulohaza, qayta o'qitish, anketalarni bekor qilish, vaqtinchalik to'xtatish yoki chetlashtirish."},
      {q:"Tekshiruv qanday o'tkaziladi?",opts:["Faqat birinchi kuni","Oy oxirida bir marta","Tizimli va muntazam ravishda","Faqat shikoyat bo'lganda"],ok:2,ex:"Sifat nazorati tizimli va muntazam o'tkaziladi."}
    ]
  },
  {
    id:9, ico:"🎯",
    title:"9-dars: Amaliy Testlar va Ishga Yo'l Olish",
    sub:"Oxirgi bosqichlar",
    body:`
<h3 class="sub">Amaliy bosqichlar:</h3>
<div class="steps">
  <div class="step"><div class="step-n">1</div><div class="step-t">Onlayn-testdan o'tish</div></div>
  <div class="step"><div class="step-n">2</div><div class="step-t">Ikkita taqlid intervyu o'tkazish (ID 1 va ID 2)</div></div>
  <div class="step"><div class="step-n">3</div><div class="step-t">Anketalarni yuborish</div></div>
  <div class="step"><div class="step-n">4</div><div class="step-t">Fikr-mulohaza olish</div></div>
</div>
<div class="box amber"><span class="box-ico">🔑</span><div class="box-txt">Bu qadamlar yo'l olish uchun <strong>majburiydir</strong>.</div></div>

<h3 class="sub">Ishni boshlash tartibi:</h3>
<ul class="clist">
  <li>Muvaffaqiyatli tekshiruvdan so'ng: shartnoma, kvota topshirig'i, bejdik va qo'llab-quvvatlash xati olasiz</li>
  <li>Birinchi kundan so'ng — tekshirish uchun pauza</li>
  <li>Qo'shimcha fikr-mulohaza olish</li>
  <li>Sifat tasdiqlanganda — ishni davom ettirish</li>
  <li>Xatolar aniqlanganda — tuzatish va qayta tekshirish</li>
</ul>

<div class="hbox"><h4>🎉 Barcha darslarni yakunladingiz!</h4><p>Endi siz dala ishiga to'liq tayyorsiz. Biz har bir bosqichda siz bilan birgamiz. Muvaffaqiyatlar!</p></div>`,
    qs:[
      {q:"Taqlid intervyularni kimlar orasida o'tkazish kerak?",opts:["Begona odamlar orasida","Tanishlaringiz orasida (ID 1 va ID 2)","Faqat oila a'zolari orasida","Menejer bilan"],ok:1,ex:"Tanishlaringiz orasida ikkita taqlid intervyu o'tkazasiz (ID 1 va ID 2)."},
      {q:"Ishni boshlash uchun nima olasiz?",opts:["Faqat anketa","Shartnoma, kvota topshirig'i, bejdik va qo'llab-quvvatlash xati","Faqat bejdik","Pul to'lovi"],ok:1,ex:"Muvaffaqiyatli tekshiruvdan so'ng siz shartnoma, kvota topshirig'i, bejdik va qo'llab-quvvatlash xati olasiz."},
      {q:"Birinchi kun dalada ishlasangiz keyin nima bo'ladi?",opts:["Darhol ishni davom ettirasiz","Tekshirish uchun pauza qilinadi, qo'shimcha fikr-mulohaza beriladi","Avtomatik sertifikat beriladi","Yangi kvota topshirig'i beriladi"],ok:1,ex:"Birinchi kundan so'ng tekshirish uchun pauza qilinadi. Sifat tasdiqlanganda — ishni davom ettirasiz."}
    ]
  }
];

// ── STATE ──────────────────────────────────────
let S = { lesson:0, unlocked:0, phase:'lesson', ans:{}, submitted:false };

// ── HEADER ─────────────────────────────────────
function renderDots() {
  document.getElementById('dots').innerHTML = lessons.map((l,i) => {
    let c = 'pdot';
    if (i < S.unlocked) c = 'pdot done';
    else if (i === S.lesson) c = 'pdot active';
    return `<div class="${c}">${i===0?'K':i}</div>`;
  }).join('');
}

// ── MAIN ────────────────────────────────────────
function render() {
  renderDots();
  const app = document.getElementById('app');
  const L = lessons[S.lesson];

  if (S.phase === 'lesson') {
    app.innerHTML = `<div class="page">
      <div class="card">
        <div class="card-top">
          <div class="card-emoji">${L.ico}</div>
          <div><h2>${L.title}</h2><p>${L.sub}</p></div>
        </div>
        <div class="card-body">${L.body}</div>
      </div>
      <div class="start-row">
        <button class="btn btn-go btn-full" onclick="goQuiz()">
          📝 &nbsp;Testga o'tish →
        </button>
      </div>
    </div>`;
  }
  else if (S.phase === 'quiz') {
    const qs = L.qs;
    const answered = Object.keys(S.ans).length;
    const allDone = answered === qs.length;
    const LABS = ['A','B','V','G'];

    const qsHTML = qs.map((q,qi) => {
      const chosen = S.ans[qi];
      const optsHTML = q.opts.map((opt,oi) => {
        let cls = 'opt';
        let dis = '';
        if (S.submitted) {
          dis = 'disabled';
          if (oi === q.ok) cls += ' corr';
          else if (chosen === oi) cls += ' wrong';
        } else {
          if (chosen === oi) cls += ' sel';
        }
        return `<button class="${cls}" ${dis} onclick="pick(${qi},${oi})">
          <span class="olbl">${LABS[oi]}</span>${opt}
        </button>`;
      }).join('');

      let fb = '';
      if (S.submitted) {
        const ok = chosen === q.ok;
        fb = `<div class="qfb show ${ok?'ok':'bad'}">${ok?'✅ To\'g\'ri!':'❌ Noto\'g\'ri.'} ${q.ex}</div>`;
      }

      return `<div class="qblock">
        <div class="qnum">Savol ${qi+1} / ${qs.length}</div>
        <div class="qtxt">${q.q}</div>
        <div class="opts">${optsHTML}</div>${fb}
      </div>`;
    }).join('<div class="qdiv"></div>');

    let footer = '';
    if (!S.submitted) {
      footer = `<div class="qfoot">
        <div class="qfoot-top">
          <span class="qscore">${answered} / ${qs.length} javob berildi</span>
        </div>
        <button class="btn btn-ok btn-full" onclick="submit()" ${allDone?'':'disabled'}>
          ✓ &nbsp;Tekshirish
        </button>
      </div>`;
    } else {
      const score = qs.filter((_,i) => S.ans[i] === qs[i].ok).length;
      const pct = Math.round(score/qs.length*100);
      const pass = pct >= PASS;
      const isLast = S.lesson === lessons.length - 1;
      footer = `<div class="qfoot">
        <div class="qfoot-top">
          <span class="qscore">Natija: <strong>${score}/${qs.length}</strong> (${pct}%)</span>
        </div>
        <div class="qfoot-btns">
          ${pass && !isLast ? `<button class="btn btn-next btn-full" onclick="nextLesson()">Keyingi darsga o'tish →</button>` : ''}
          ${pass && isLast  ? `<button class="btn btn-next btn-full" onclick="finish()">🏆 &nbsp;Tugatish</button>` : ''}
          <button class="btn btn-retry btn-full" onclick="retry()">🔄 &nbsp;Qayta urinish</button>
          <button class="btn btn-back btn-full" onclick="backLesson()">📖 &nbsp;Darsni qayta o'qish</button>
        </div>
      </div>`;
    }

    app.innerHTML = `<div class="page">
      <div class="card">
        <div class="quiz-top">
          <div class="qico">📝</div>
          <div><h3>${L.title} — Test</h3><p>Keyingi darsga o'tish uchun kamida ${PASS}% to'g'ri javob bering</p></div>
        </div>
        <div class="quiz-body">${qsHTML}${footer}</div>
      </div>
    </div>`;
  }
  else if (S.phase === 'done') {
    app.innerHTML = `<div class="page">
      <div class="card">
        <div class="result">
          <div class="r-emoji">🏆</div>
          <div class="r-title">Tabriklaymiz!<br>Barcha darslar tugadi!</div>
          <div class="rbar"><div class="rfill" style="width:100%"></div></div>
          <div class="r-sub">Siz barcha 10 ta darsni va testlarni muvaffaqiyatli yakunladingiz. Endi dala ishiga to'liq tayyorsiz!</div>
          <div class="r-btns">
            <button class="btn btn-back btn-full" onclick="backLesson()">📖 &nbsp;Oxirgi darsni ko'rish</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  window.scrollTo({top:0, behavior:'smooth'});
}

// ── ACTIONS ─────────────────────────────────────
function goQuiz()    { S.phase='quiz'; S.ans={}; S.submitted=false; render(); }
function backLesson(){ S.phase='lesson'; render(); }
function pick(qi,oi) { if (!S.submitted){ S.ans[qi]=oi; render(); } }
function submit() {
  if (Object.keys(S.ans).length < lessons[S.lesson].qs.length) return;
  S.submitted = true; render();
}
function retry()     { S.phase='quiz'; S.ans={}; S.submitted=false; render(); }
function nextLesson(){
  const n = S.lesson+1;
  if (n < lessons.length){
    if (S.unlocked < n) S.unlocked = n;
    S.lesson=n; S.phase='lesson'; S.ans={}; S.submitted=false; render();
  }
}
function finish() { S.phase='done'; render(); }

render();
</script>
</body>
</html>
